<!DOCTYPE html>
<html>
<head>
<title>register</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins';
background:#FFF7CC;
display:flex;
flex-direction:column;
min-height:100vh;
}

.navbar{
background:white;
padding:12px 30px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #eee;
}

.logo{
font-weight:600;
color:#333;
}

.nav-links a{
margin:0 10px;
text-decoration:none;
color:#555;
font-size:14px;
}

.btn{
background:#FFE066;
padding:6px 15px;
border-radius:20px;
border:none;
cursor:pointer;
}

main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
padding:30px;
border-radius:20px;
width:350px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:1px solid #eee;
font-family:'Poppins';
}

button{
background:#FFE066;
border:none;
cursor:pointer;
}

/* FIXED CHECKBOX ALIGNMENT */
.checkbox{
display:flex;
align-items:center;
gap:8px;
margin-top:10px;
font-size:14px;
color:#555;
}

.checkbox input{
width:auto;
margin:0;
}

footer{
background:white;
text-align:center;
padding:10px;
border-top:1px solid #eee;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">fare guide</div>

<div class="nav-links">
<a href="index.html">home</a>
<a href="#">fare matrix</a>
<a href="#">schedule</a>
<a href="#">help</a>
</div>

<a href="registration.html"><button class="btn">create account</button></a>
</div>

<main>
<div class="card">

<h2>create account</h2>

<input id="name" placeholder="full name">
<input id="contact" placeholder="contact number">

<div class="checkbox">
<input type="checkbox" id="agree">
<label for="agree">accept terms</label>
</div>

<button onclick="submit()">submit</button>

</div>
</main>

<footer>
Bunanan 26 🍌🌼
</footer>

<script>
function submit(){

if(!agree.checked){
alert("accept terms");
return;
}

if(name.value=="" || contact.value==""){
alert("complete fields");
return;
}

localStorage.setItem("name",name.value);

window.location.href="confirmation.html";
}
</script>

</body>
</html>
